<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="皮克敏路線">
    <title>皮克敏花田採果最優路線規劃</title>
    <style>
        /* 皮克敏主題美化設定 */
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 15px;
            background: linear-gradient(135deg, #e0f7fa 0%, #c8e6c9 100%);
            color: #2d3436;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            max-width: 600px;
            width: 100%;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid #a5d6a7;
        }
        h2 { 
            text-align: center; 
            font-size: 1.5rem; 
            margin-top: 0;
            margin-bottom: 8px; 
            color: #2e7d32; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .subtitle { 
            text-align: center; 
            font-size: 0.9rem; 
            color: #555; 
            margin-bottom: 20px;
            font-weight: bold;
            background-color: #fff9c4; 
            padding: 5px 10px;
            border-radius: 15px;
            display: inline-block;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
        
        /* 區塊標題 */
        .section-title {
            font-size: 14px;
            color: #00695c;
            font-weight: bold;
            margin-bottom: 8px;
            margin-top: 15px;
            border-bottom: 2px solid #b2dfdb;
            padding-bottom: 4px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #c8d6e5;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            resize: none;
            margin-bottom: 12px;
            background-color: #f8fcf8;
        }
        textarea:focus {
            outline: none;
            border-color: #81c784;
            box-shadow: 0 0 5px rgba(129, 199, 132, 0.5);
        }
        
        .btn {
            padding: 12px 8px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }
        .btn:active { transform: scale(0.98); }
        
        /* 按鈕顏色配置 */
        .btn-primary { 
            background-color: #ff5252; /* 紅皮克敏 - 計算用 */
            color: white; 
            box-shadow: 0 4px 0 #d32f2f;
            margin-bottom: 10px;
            font-size: 17px;
            padding: 14px;
        }
        .btn-primary:active { box-shadow: 0 0 0 #d32f2f; transform: translateY(4px); }

        .btn-direct { 
            background-color: #5c6bc0; /* 靛藍色 - 直接讀取用 */
            color: white; 
            box-shadow: 0 4px 0 #3949ab;
        }
        .btn-direct:active { box-shadow: 0 0 0 #3949ab; transform: translateY(4px); }

        .btn-calc { 
            background-color: #ab47bc; /* 紫色 - 需計算用 */
            color: white; 
            box-shadow: 0 4px 0 #8e24aa;
        }
        .btn-calc:active { box-shadow: 0 0 0 #8e24aa; transform: translateY(4px); }

        .btn-paste { 
            background-color: #448aff; /* 藍皮克敏 - 貼上 */
            color: white; 
            box-shadow: 0 4px 0 #2962ff;
            margin-bottom: 5px;
        }
        .btn-paste:active { box-shadow: 0 0 0 #2962ff; transform: translateY(4px); }

        .btn-clear { 
            background-color: #ffca28; /* 黃皮克敏 */
            color: #424242; 
            box-shadow: 0 4px 0 #f57f17;
            margin-bottom: 5px;
            font-size: 16px;
            padding: 12px;
        }
        .btn-clear:active { box-shadow: 0 0 0 #f57f17; transform: translateY(4px); }
        
        .btn-copy { 
            background-color: #66bb6a; /* 綠色 */
            color: white; 
            box-shadow: 0 4px 0 #388e3c;
            font-size: 17px;
            padding: 14px;
            margin-top: 10px;
        }
        .btn-copy:active { box-shadow: 0 0 0 #388e3c; transform: translateY(4px); }

        /* 新增：最後座標複製按鈕 */
        .btn-copy-last { 
            background-color: #26a69a; /* 藍綠色 */
            color: white; 
            box-shadow: 0 4px 0 #00695c;
            font-size: 17px;
            padding: 14px;
            margin-top: 10px;
        }
        .btn-copy-last:active { box-shadow: 0 0 0 #00695c; transform: translateY(4px); }

        .btn-group-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-group-row .btn {
            margin: 0;
            flex: 1;
        }

        /* 強化輸出結果文字 */
        .output-box {
            background-color: #f1f8e9;
            padding: 15px;
            border-radius: 12px;
            border: 2px dashed #aed581;
            min-height: 120px;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px; /* 稍微放大 */
            font-weight: 900; /* 特粗體 */
            color: #000000; /* 純黑字體 */
            margin-bottom: 10px;
        }
        .log-text {
            font-size: 14px;
            color: #0277bd;
            background-color: #e1f5fe;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            border-left: 4px solid #0288d1;
            white-space: pre-line;
        }
        .summary-text {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #e65100;
            background-color: #fff3e0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌸 皮克敏花田採果最優路線規劃 🌸</h2>
        <div class="subtitle">浩文_hsen設計 ☆☆ 目前版本：2026_06_17_12:57 ☆☆</div>
        
        <button onclick="clearData()" class="btn btn-clear">🔄 新資料重新輸入 (清除全部)</button>
        
        <input type="file" id="gpxInputCalc" accept=".gpx,.xml,.txt" style="display: none;">
        <input type="file" id="gpxInputDirect" accept=".gpx,.xml,.txt" style="display: none;">
        
        <div class="section-title">📂 上傳本機檔案</div>
        <div class="btn-group-row">
            <button onclick="document.getElementById('gpxInputCalc').click()" class="btn btn-calc">🌸 花朵檔案<br><small>(需計算路線)</small></button>
            <button onclick="document.getElementById('gpxInputDirect').click()" class="btn btn-direct">🏁 收果檔案<br><small>(直接提取座標)</small></button>
        </div>

        <div class="section-title">🔗 貼上網路連結</div>
        <div class="btn-group-row">
            <button onclick="importFromURL('calc')" class="btn btn-calc">🌸 花朵連結<br><small>(需計算路線)</small></button>
            <button onclick="importFromURL('direct')" class="btn btn-direct">🏁 收果連結<br><small>(直接提取座標)</small></button>
        </div>
        
        <div class="section-title">📋 直接貼上座標</div>
        <button onclick="pasteCoords()" class="btn btn-paste">📋 從剪貼簿貼上</button>
        <textarea id="inputCoords" placeholder="請在此貼上座標文字 🌱&#10;(按下方紅按鈕進行計算，系統會自動剔除括號與重複座標)"></textarea>
        
        <button onclick="calculateRoute()" class="btn btn-primary">🚀 計算極限交集路徑</button>
        
        <div id="logArea" class="log-text" style="display: none;"></div>
        <div id="outputArea" class="output-box">🌱 結果將顯示於此...</div>
        <div id="summaryArea" class="summary-text" style="display: none;"></div>
        
        <button id="copyBtn" onclick="copyResult()" class="btn btn-copy" style="display: none;">📄 複製完整座標結果</button>
        <button id="copyLastBtn" onclick="copyLastCoordinate()" class="btn btn-copy-last" style="display: none;">🎯 複製最後的收果座標</button>
    </div>

    <script>
        // 核心解析邏輯：mode 可以是 'calc' (需要計算) 或 'direct' (直接顯示)
        function processGPXString(xmlStr, sourceName, mode) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");

            const points = xmlDoc.querySelectorAll('trkpt, wpt, rtept');
            let coordsArr = [];
            points.forEach(pt => {
                const lat = pt.getAttribute('lat');
                const lon = pt.getAttribute('lon');
                if (lat && lon) {
                    coordsArr.push(`${parseFloat(lat).toFixed(6)}, ${parseFloat(lon).toFixed(6)}`);
                }
            });

            if (coordsArr.length > 0) {
                if (mode === 'calc') {
                    // 需要計算模式：把資料丟進輸入框，然後呼叫計算函數
                    document.getElementById('inputCoords').value = coordsArr.join('\n');
                    const currentLog = document.getElementById('logArea').innerText;
                    const newLog = `🌐 從 ${sourceName} 讀取 ${coordsArr.length} 朵花，準備計算最佳路線...`;
                    document.getElementById('logArea').innerText = currentLog ? currentLog + "\n" + newLog : newLog;
                    document.getElementById('logArea').style.display = 'block';
                    calculateRoute();
                } else if (mode === 'direct') {
                    // 直接讀取模式：不計算，直接顯示在結果區
                    document.getElementById('inputCoords').value = "（已從來源直接提取收果路線，無需計算）";
                    
                    let outputStr = coordsArr.join('\n');
                    document.getElementById('outputArea').innerText = outputStr;
                    
                    document.getElementById('logArea').innerText = `✅ 成功從 ${sourceName} 直接提取 ${coordsArr.length} 個收果座標！`;
                    document.getElementById('logArea').style.display = 'block';
                    
                    document.getElementById('summaryArea').innerText = `🎯 直接提取完畢，共 ${coordsArr.length} 個座標點。`;
                    document.getElementById('summaryArea').style.display = 'block';
                    document.getElementById('copyBtn').style.display = 'block';
                    document.getElementById('copyLastBtn').style.display = 'block';
                }
            } else {
                alert(`⚠️ 無法在 ${sourceName} 中找到有效的 GPX 座標資訊！`);
                document.getElementById('logArea').innerText = "";
                document.getElementById('logArea').style.display = 'none';
            }
        }

        // 監聽本機檔案上傳
        document.getElementById('gpxInputCalc').addEventListener('change', function(e) {
            handleFileSelect(e, 'calc');
        });
        document.getElementById('gpxInputDirect').addEventListener('change', function(e) {
            handleFileSelect(e, 'direct');
        });

        function handleFileSelect(e, mode) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                document.getElementById('logArea').innerText = ""; 
                processGPXString(evt.target.result, "上傳檔案", mode);
            };
            reader.readAsText(file);
            e.target.value = ''; 
        }

        // 網址匯入功能
        async function importFromURL(mode) {
            const modeText = mode === 'calc' ? '花朵 (需計算)' : '收果 (直接提取)';
            let targetUrl = prompt(`請貼上【${modeText}】的 GPX 下載網址：\n(支援一般網址與 Google Drive 分享連結)`);
            if (!targetUrl || targetUrl.trim() === "") return;
            
            targetUrl = targetUrl.trim();
            document.getElementById('logArea').innerText = "⏳ 正在分析與抓取資料，請稍候...";
            document.getElementById('logArea').style.display = 'block';

            const gdriveRegex = /drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/;
            const match = targetUrl.match(gdriveRegex);
            
            if (match && match[1]) {
                const fileId = match[1];
                targetUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
                document.getElementById('logArea').innerText = "🤖 偵測到 Google Drive 連結，已自動轉換...\n⏳ 正在抓取資料...";
            }

            try {
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("網路連線錯誤");
                
                const xmlText = await response.text();
                processGPXString(xmlText, "網址連結", mode);
            } catch (error) {
                document.getElementById('logArea').style.display = 'none';
                alert("❌ 網址讀取失敗！請檢查網址是否公開有效。");
            }
        }

        // 清除所有資料
        function clearData() {
            document.getElementById('inputCoords').value = '';
            document.getElementById('outputArea').innerText = '🌱 結果將顯示於此...';
            document.getElementById('logArea').style.display = 'none';
            document.getElementById('logArea').innerText = '';
            document.getElementById('summaryArea').style.display = 'none';
            document.getElementById('summaryArea').innerText = '';
            document.getElementById('copyBtn').style.display = 'none';
            document.getElementById('copyLastBtn').style.display = 'none';
        }

        async function pasteCoords() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputCoords').value = text;
            } catch (err) {
                alert('系統權限阻擋，請手動長按輸入框並選擇「貼上」。');
            }
        }

        async function copyResult() {
            const outputText = document.getElementById('outputArea').innerText;
            if (!outputText || outputText.includes("顯示於此") || outputText.includes("請輸入")) return;
            try {
                await navigator.clipboard.writeText(outputText);
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.innerText;
                copyBtn.innerText = '✅ 已成功複製全部！';
                setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
            } catch (err) {
                alert('複製失敗，請手動全選複製。');
            }
        }

        async function copyLastCoordinate() {
            const outputText = document.getElementById('outputArea').innerText;
            if (!outputText || outputText.includes("顯示於此") || outputText.includes("請輸入")) return;
            
            // 將輸出結果以換行符號分割，並過濾掉空行，取得最後一行
            const lines = outputText.trim().split('\n');
            const lastLine = lines[lines.length - 1];
            
            try {
                await navigator.clipboard.writeText(lastLine);
                const copyLastBtn = document.getElementById('copyLastBtn');
                const originalText = copyLastBtn.innerText;
                copyLastBtn.innerText = '✅ 已成功複製最後座標！';
                setTimeout(() => { copyLastBtn.innerText = originalText; }, 2000);
            } catch (err) {
                alert('複製失敗，請手動選取最後一行複製。');
            }
        }

        function toLocalXY(lat, lng, originLat, originLng) {
            const R = 6371000;
            const x = (lng - originLng) * (Math.PI / 180) * Math.cos(originLat * Math.PI / 180) * R;
            const y = (lat - originLat) * (Math.PI / 180) * R;
            return {x, y};
        }

        function toLatLng(x, y, originLat, originLng) {
            const R = 6371000;
            const lat = originLat + (y / R) * (180 / Math.PI);
            const lng = originLng + (x / (R * Math.cos(originLat * Math.PI / 180))) * (180 / Math.PI);
            return {lat, lng};
        }

        function getDistanceXY(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function getDistanceLatLgn(lat1, lon1, lat2, lon2) {
            const R = 6371000; 
            const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getCircleIntersections(p1, p2, r = 40) {
            let d = getDistanceXY(p1, p2);
            if (d > 2 * r || d === 0) return []; 
            let a = d / 2;
            let h = Math.sqrt(r * r - a * a);
            let p3 = { x: p1.x + a * (p2.x - p1.x) / d, y: p1.y + a * (p2.y - p1.y) / d };
            return [
                { x: p3.x + h * (p2.y - p1.y) / d, y: p3.y - h * (p2.x - p1.x) / d },
                { x: p3.x - h * (p2.y - p1.y) / d, y: p3.y + h * (p2.x - p1.x) / d }
            ];
        }

        function optimizeRoute2Opt(route) {
            let improved = true;
            while (improved) {
                improved = false;
                for (let i = 1; i < route.length - 2; i++) {
                    for (let j = i + 1; j < route.length - 1; j++) {
                        let currentDist = getDistanceXY(route[i-1], route[i]) + getDistanceXY(route[j], route[j+1]);
                        let newDist = getDistanceXY(route[i-1], route[j]) + getDistanceXY(route[i], route[j+1]);
                        if (newDist < currentDist) {
                            let reversed = route.slice(i, j + 1).reverse();
                            route.splice(i, j - i + 1, ...reversed);
                            improved = true;
                        }
                    }
                }
            }
            return route;
        }

        function calculateRoute() {
            let rawInput = document.getElementById('inputCoords').value;
            // 防呆：如果輸入框顯示的是已經提取的提示，就不進行計算
            if (rawInput.includes("已從來源直接提取")) {
                alert("目前的資料是直接提取的收果路線，不需要重複計算！");
                return;
            }

            let cleanedInput = rawInput.replace(/[()\[\]<>]/g, '');
            let hasBrackets = rawInput !== cleanedInput;
            
            const lines = cleanedInput.split('\n');
            let rawCoords = [];
            let uniqueCheck = new Set();
            let duplicateCount = 0;

            lines.forEach(line => {
                const parts = line.split(',');
                if(parts.length >= 2) {
                    const lat = parseFloat(parts[0].trim());
                    const lng = parseFloat(parts[1].trim());
                    if(!isNaN(lat) && !isNaN(lng)) {
                        const key = `${lat.toFixed(6)},${lng.toFixed(6)}`;
                        if(!uniqueCheck.has(key)) {
                            uniqueCheck.add(key);
                            rawCoords.push({lat, lng});
                        } else {
                            duplicateCount++;
                        }
                    }
                }
            });

            let logMsg = document.getElementById('logArea').innerText;
            if (logMsg.includes("✨ 已自動清除")) logMsg = logMsg.split("✨ 已自動清除")[0].trim() + "\n"; 
            if (logMsg.includes("✨ 偵測到重複")) logMsg = logMsg.split("✨ 偵測到重複")[0].trim() + "\n"; 

            if (hasBrackets) logMsg += "✨ 已自動清除括號與特殊符號\n";
            if (duplicateCount > 0) logMsg += `✨ 偵測到重複座標，已自動剔除 ${duplicateCount} 筆\n`;
            
            if (logMsg.trim()) {
                document.getElementById('logArea').innerText = logMsg.trim();
                document.getElementById('logArea').style.display = 'block';
            }

            if(rawCoords.length === 0) {
                document.getElementById('outputArea').innerText = "⚠️ 請在上方文字框輸入有效的花朵座標，或上傳檔案！";
                return;
            }

            const flowerCount = rawCoords.length;
            const originLat = rawCoords[0].lat;
            const originLng = rawCoords[0].lng;
            
            let flowers = rawCoords.map((p, index) => {
                let xy = toLocalXY(p.lat, p.lng, originLat, originLng);
                return { id: index, x: xy.x, y: xy.y };
            });

            let candidates = [...flowers];
            for (let i = 0; i < flowers.length; i++) {
                for (let j = i + 1; j < flowers.length; j++) {
                    let intersects = getCircleIntersections(flowers[i], flowers[j], 40);
                    candidates.push(...intersects);
                }
            }

            candidates.forEach(c => {
                c.covered = flowers.filter(f => getDistanceXY(c, f) <= 40.5).map(f => f.id);
            });

            let uncoveredFlowers = new Set(flowers.map(f => f.id));
            let selectedStops = [];
            while (uncoveredFlowers.size > 0) {
                let bestCandidate = null;
                let maxCovered = 0;
                candidates.forEach(c => {
                    let newlyCovered = c.covered.filter(id => uncoveredFlowers.has(id)).length;
                    if (newlyCovered > maxCovered) {
                        maxCovered = newlyCovered;
                        bestCandidate = c;
                    }
                });
                selectedStops.push(bestCandidate);
                bestCandidate.covered.forEach(id => uncoveredFlowers.delete(id));
            }

            let centerXY = {x: 0, y: 0};
            flowers.forEach(f => { centerXY.x += f.x; centerXY.y += f.y; });
            centerXY.x /= flowerCount;
            centerXY.y /= flowerCount;

            let absoluteBestRoute = null;
            let minTotalDist = Infinity;

            for (let i = 0; i < selectedStops.length; i++) {
                let startNode = selectedStops[i];
                let route = [startNode];
                let unvisited = [...selectedStops];
                unvisited.splice(i, 1);
                
                while(unvisited.length > 0) {
                    let nearestIdx = 0, minDist = Infinity;
                    for(let j = 0; j < unvisited.length; j++) {
                        let d = getDistanceXY(route[route.length-1], unvisited[j]);
                        if(d < minDist) { minDist = d; nearestIdx = j; }
                    }
                    route.push(unvisited[nearestIdx]);
                    unvisited.splice(nearestIdx, 1);
                }
                
                route = optimizeRoute2Opt(route);

                let dist = 0;
                for(let k = 0; k < route.length - 1; k++) {
                    dist += getDistanceXY(route[k], route[k+1]);
                }
                dist += getDistanceXY(route[route.length-1], centerXY);

                if (dist < minTotalDist) {
                    minTotalDist = dist;
                    absoluteBestRoute = route;
                }
            }

            let finalLatLngs = absoluteBestRoute.map(p => toLatLng(p.x, p.y, originLat, originLng));
            
            let p0 = absoluteBestRoute[0];
            let startXY = { x: p0.x, y: p0.y };
            
            if (absoluteBestRoute.length > 1) {
                let p1 = absoluteBestRoute[1];
                let dx = p0.x - p1.x;
                let dy = p0.y - p1.y;
                let len = Math.sqrt(dx*dx + dy*dy);
                if (len > 0) {
                    startXY.x = p0.x + (dx/len) * 111.11;
                    startXY.y = p0.y + (dy/len) * 111.11;
                }
            } else {
                startXY.y += 111.11;
            }
            let startPtLatLng = toLatLng(startXY.x, startXY.y, originLat, originLng);
            const endPtLatLng = toLatLng(centerXY.x, centerXY.y, originLat, originLng);

            let totalDistanceMeters = 111.11; 
            for(let i=0; i<finalLatLngs.length-1; i++){
                totalDistanceMeters += getDistanceLatLgn(finalLatLngs[i].lat, finalLatLngs[i].lng, finalLatLngs[i+1].lat, finalLatLngs[i+1].lng);
            }
            totalDistanceMeters += getDistanceLatLgn(finalLatLngs[finalLatLngs.length-1].lat, finalLatLngs[finalLatLngs.length-1].lng, endPtLatLng.lat, endPtLatLng.lng);

            const totalSeconds = Math.round(totalDistanceMeters / 5.555);
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;

            let outputStr = `${startPtLatLng.lat.toFixed(6)}, ${startPtLatLng.lng.toFixed(6)}\n`;
            finalLatLngs.forEach(p => {
                outputStr += `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}\n`;
            });
            outputStr += `${endPtLatLng.lat.toFixed(6)}, ${endPtLatLng.lng.toFixed(6)}`;

            document.getElementById('outputArea').innerText = outputStr;
            
            document.getElementById('summaryArea').innerText = `🎯 分析 ${flowerCount} 朵花，合併為 ${finalLatLngs.length} 個交集踩點\n⏱️ 全程預估：${mins} 分 ${secs} 秒`;
            document.getElementById('summaryArea').style.display = 'block';
            document.getElementById('copyBtn').style.display = 'block';
            document.getElementById('copyLastBtn').style.display = 'block';
        }
    </script>
</body>
