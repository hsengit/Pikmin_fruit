<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="皮克敏路線">
    <title>皮克敏路線最佳化 (圓交點幾何版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            max-width: 600px;
            margin: auto;
        }
        h2 { text-align: center; font-size: 1.4rem; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            resize: none;
            margin-bottom: 10px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0 15px 0;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-primary { background-color: #007aff; color: white; }
        .btn-primary:active { background-color: #005bb5; }
        .btn-secondary { background-color: #e5e5ea; color: #333; padding: 10px; font-size: 16px; }
        .btn-secondary:active { background-color: #d1d1d6; }
        .output-box {
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            min-height: 150px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .summary-text {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #d9534f;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h2>巨大花朵路線規劃</h2>
    <div class="subtitle">搭載幾何圓交點 Set Cover 最佳化</div>
    
    <button onclick="pasteCoords()" class="btn btn-secondary">📋 貼上座標</button>
    <textarea id="inputCoords" placeholder="請貼上花朵座標 (一行一個)"></textarea>
    
    <button onclick="calculateRoute()" class="btn btn-primary">產生極限交集路徑</button>
    
    <div id="outputArea" class="output-box">結果將顯示於此...</div>
    
    <div id="summaryArea" class="summary-text" style="display: none;"></div>
    
    <button id="copyBtn" onclick="copyResult()" class="btn btn-secondary" style="display: none;">📄 複製純座標結果</button>

    <script>
        async function pasteCoords() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputCoords').value = text;
            } catch (err) {
                alert('請手動長按輸入框並選擇「貼上」。');
            }
        }

        async function copyResult() {
            const outputText = document.getElementById('outputArea').innerText;
            if (!outputText || outputText === "結果將顯示於此..." || outputText.includes("請輸入")) return;
            try {
                await navigator.clipboard.writeText(outputText);
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.innerText;
                copyBtn.innerText = '✅ 已複製！';
                setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
            } catch (err) {
                alert('複製失敗，請手動長按文字全選。');
            }
        }

        // 經緯度轉平面公尺 (以第一點為原點的局部投影)
        function toLocalXY(lat, lng, originLat, originLng) {
            const R = 6371000;
            const x = (lng - originLng) * (Math.PI / 180) * Math.cos(originLat * Math.PI / 180) * R;
            const y = (lat - originLat) * (Math.PI / 180) * R;
            return {x, y};
        }

        // 平面公尺轉經緯度
        function toLatLng(x, y, originLat, originLng) {
            const R = 6371000;
            const lat = originLat + (y / R) * (180 / Math.PI);
            const lng = originLng + (x / (R * Math.cos(originLat * Math.PI / 180))) * (180 / Math.PI);
            return {lat, lng};
        }

        function getDistanceXY(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function getDistanceLatLgn(lat1, lon1, lat2, lon2) {
            const R = 6371000; 
            const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 計算兩個圓(半徑 40m)的交點
        function getCircleIntersections(p1, p2, r = 40) {
            let d = getDistanceXY(p1, p2);
            if (d > 2 * r || d === 0) return []; // 沒交集或同一個點
            
            let a = d / 2;
            let h = Math.sqrt(r * r - a * a);
            let p3 = { x: p1.x + a * (p2.x - p1.x) / d, y: p1.y + a * (p2.y - p1.y) / d };
            
            return [
                { x: p3.x + h * (p2.y - p1.y) / d, y: p3.y - h * (p2.x - p1.x) / d },
                { x: p3.x - h * (p2.y - p1.y) / d, y: p3.y + h * (p2.x - p1.x) / d }
            ];
        }

        // 2-Opt 演算法 (平面距離)
        function optimizeRoute2Opt(route) {
            let improved = true;
            while (improved) {
                improved = false;
                for (let i = 1; i < route.length - 2; i++) {
                    for (let j = i + 1; j < route.length - 1; j++) {
                        let currentDist = getDistanceXY(route[i-1], route[i]) + getDistanceXY(route[j], route[j+1]);
                        let newDist = getDistanceXY(route[i-1], route[j]) + getDistanceXY(route[i], route[j+1]);
                        if (newDist < currentDist) {
                            let reversed = route.slice(i, j + 1).reverse();
                            route.splice(i, j - i + 1, ...reversed);
                            improved = true;
                        }
                    }
                }
            }
            return route;
        }

        function calculateRoute() {
            const input = document.getElementById('inputCoords').value;
            const lines = input.split('\n');
            let rawCoords = [];
            let uniqueCheck = new Set();

            lines.forEach(line => {
                const parts = line.split(',');
                if(parts.length >= 2) {
                    const lat = parseFloat(parts[0].trim());
                    const lng = parseFloat(parts[1].trim());
                    if(!isNaN(lat) && !isNaN(lng)) {
                        const key = `${lat.toFixed(6)},${lng.toFixed(6)}`;
                        if(!uniqueCheck.has(key)) {
                            uniqueCheck.add(key);
                            rawCoords.push({lat, lng});
                        }
                    }
                }
            });

            if(rawCoords.length === 0) {
                document.getElementById('outputArea').innerText = "請輸入有效的座標！";
                return;
            }

            const flowerCount = rawCoords.length;
            const originLat = rawCoords[0].lat;
            const originLng = rawCoords[0].lng;
            
            // 轉成平面座標計算，精確度更高且速度更快
            let flowers = rawCoords.map((p, index) => {
                let xy = toLocalXY(p.lat, p.lng, originLat, originLng);
                return { id: index, x: xy.x, y: xy.y };
            });

            // 1. 產生所有候選踩點 (花朵正中心 + 所有互相交疊的圓的交點)
            let candidates = [...flowers];
            for (let i = 0; i < flowers.length; i++) {
                for (let j = i + 1; j < flowers.length; j++) {
                    let intersects = getCircleIntersections(flowers[i], flowers[j], 40);
                    candidates.push(...intersects);
                }
            }

            // 2. 針對每個候選踩點，計算能吃到哪些花 (容錯 40.5m)
            candidates.forEach(c => {
                c.covered = flowers.filter(f => getDistanceXY(c, f) <= 40.5).map(f => f.id);
            });

            // 3. 貪婪集合覆蓋 (Greedy Set Cover)：每次挑選能覆蓋最多未處理花朵的踩點
            let uncoveredFlowers = new Set(flowers.map(f => f.id));
            let selectedStops = [];

            while (uncoveredFlowers.size > 0) {
                let bestCandidate = null;
                let maxCovered = 0;

                candidates.forEach(c => {
                    let newlyCovered = c.covered.filter(id => uncoveredFlowers.has(id)).length;
                    if (newlyCovered > maxCovered) {
                        maxCovered = newlyCovered;
                        bestCandidate = c;
                    }
                });

                selectedStops.push(bestCandidate);
                bestCandidate.covered.forEach(id => uncoveredFlowers.delete(id));
            }

            // 4. 對選出的最佳踩點進行 TSP 最短路徑排序
            let route = [selectedStops[0]];
            let unvisited = selectedStops.slice(1);
            
            while(unvisited.length > 0) {
                let nearestIdx = 0, minDist = Infinity;
                for(let i = 0; i < unvisited.length; i++) {
                    let d = getDistanceXY(route[route.length-1], unvisited[i]);
                    if(d < minDist) { minDist = d; nearestIdx = i; }
                }
                route.push(unvisited[nearestIdx]);
                unvisited.splice(nearestIdx, 1);
            }
            route = optimizeRoute2Opt(route); // 解開交叉

            // 5. 轉換回經緯度並計算時間
            let finalLatLngs = route.map(p => toLatLng(p.x, p.y, originLat, originLng));
            
            let totalDistanceMeters = 0;
            for(let i=0; i<finalLatLngs.length-1; i++){
                totalDistanceMeters += getDistanceLatLgn(finalLatLngs[i].lat, finalLatLngs[i].lng, finalLatLngs[i+1].lat, finalLatLngs[i+1].lng);
            }

            // 幾何中心
            let sumLat = 0, sumLng = 0;
            rawCoords.forEach(p => { sumLat += p.lat; sumLng += p.lng; });
            const endPt = { lat: sumLat / flowerCount, lng: sumLng / flowerCount };
            totalDistanceMeters += getDistanceLatLgn(finalLatLngs[finalLatLngs.length-1].lat, finalLatLngs[finalLatLngs.length-1].lng, endPt.lat, endPt.lng);

            // 起點 (向外推 55.5m)
            let startPt = { lat: finalLatLngs[0].lat, lng: finalLatLngs[0].lng };
            if(finalLatLngs.length > 1) {
                const dLat = finalLatLngs[0].lat - finalLatLngs[1].lat;
                const dLng = finalLatLngs[0].lng - finalLatLngs[1].lng;
                const len = Math.sqrt(dLat*dLat + dLng*dLng);
                if(len > 0) {
                    startPt.lat = finalLatLngs[0].lat + (dLat/len) * 0.0005;
                    startPt.lng = finalLatLngs[0].lng + (dLng/len) * 0.0005;
                }
            }
            totalDistanceMeters += 55.5;

            // 時間計算
            const totalSeconds = Math.round(totalDistanceMeters / 5.55);
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;

            // 輸出
            let outputStr = `${startPt.lat.toFixed(6)}, ${startPt.lng.toFixed(6)}\n`;
            finalLatLngs.forEach(p => {
                outputStr += `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}\n`;
            });
            outputStr += `${endPt.lat.toFixed(6)}, ${endPt.lng.toFixed(6)}`;

            document.getElementById('outputArea').innerText = outputStr;
            
            document.getElementById('summaryArea').innerText = `（原始 ${flowerCount} 朵花完美濃縮為 ${finalLatLngs.length} 個極限踩點，約需${mins}分${secs}秒）`;
            document.getElementById('summaryArea').style.display = 'block';
            document.getElementById('copyBtn').style.display = 'block';
        }
    </script>
</body>
</html>
